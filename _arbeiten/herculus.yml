timestamp: 2016-11-01
title: 'Herculus.io'

description: |
  <a href="http://herculus.io">Herculus.io</a> ist eine Spreadsheet basierende
  Webanwendung für die einfache Verwaltung komplexer Datenstrukturen. Herculus
  wurde komplett mit <a href="http://www.haskell.org">Haskell</a> umgesetzt.
  <br><br>
  Über ein Internship hatte ich die Möglichkeit, in die fantastische
  <a href="http://www.haskell.org">Haskell</a> Welt
  tiefer einzutauchen. Das bedeutete Haskellprogrammierung in Vollzeit sowohl
  im Front- als auch im Backend.
  <br><br>
  Mit <a href="https://www.xing.com/profile/Moritz_Drexl/">Moritz Drexl</a> und
  <a href="https://www.xing.com/profile/Ruben_Moor/">Ruben Moor</a> hatte ich
  dabei die besten Haskell Mentoren an meiner Seite. Vielen Dank!
