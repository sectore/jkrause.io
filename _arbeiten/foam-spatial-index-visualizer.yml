timestamp: 2018-08-10
title: 'FOAM - Spatial Index and Visualizer'

description: |
  <a href="https://foam.space/">FOAM</a> ist ein offenes Protokoll für dezentralisierte, raumbezogene Daten. 
  Es bildet raumbezogene Daten sicher auf der Blockchain ab - unabhängig von externen, zentralisierten Quellen, wie z.B. GPS. 
  <br><br>
  Der <i>Spatial Index Visualizer</i> stellt Smart Contracts auf einer interaktiven Karte dar und ermöglicht es Usern, mit raumbezogenen Daten direkt zu agieren.
  <br><br>
  Gemeinsam mit den <a href="https://foam.space/company">Developer Team von FOAM</a> bin ich an der Front- und Backendentwicklung beteiligt.

