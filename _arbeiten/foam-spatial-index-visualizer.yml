timestamp: 2018-08-10
title: 'FOAM - Spatial Index and Visualizer'

description: |
  <a href="https://foam.space/">FOAM</a> ist ein offenes Protokoll für dezentralisierte, raumbezogene Daten. 
  Es bildet Geodaten sicher auf der Blockchain ab - unabhängig von externen, zentralisierten Quellen, wie z.B. GPS. 
  <br><br>
  <a href="https://map.foam.space/">FOAM's TCR (Ethereum) basierte Weltkarte</a> ermöglicht es Usern, interaktiv mit raumbezogenen Daten über Smart Contracts zu agieren.
  <br><br>
  Als Teil des <a href="https://foam.space/company">Developer Teams von FOAM</a> war ich an der Front- und Backendentwicklung beteiligt.

